name: Emergency Exit — CI

# ─── WHEN THIS RUNS ───────────────────────────────────────────────────────────
# Triggers on every push to main, and on every pull request targeting main.
# This means tests run BEFORE code reaches production.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── JOB 1: PYTHON BACKEND TESTS ──────────────────────────────────────────
  # Runs the pytest suite against identity-service/main.py
  # If any test fails, this job fails and Railway does NOT deploy.
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python (matches Railway's runtime)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install all dependencies from requirements.txt
      # plus pytest and pytest-mock which are test-only dependencies
      - name: Install dependencies
        working-directory: identity-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-mock

      # Step 4: Run the test suite
      # -v = verbose (shows each test name)
      # --tb=short = short traceback on failure (easier to read)
      # The job fails here if any test fails — Railway won't deploy
      - name: Run pytest
        working-directory: identity-service
        env:
          # Fake credentials for the test environment
          # Tests mock all external calls so these values are never used
          # but the imports expect them to exist
          MONGO_URI: mongodb://localhost:27017
          JWT_SECRET: test-secret-key-for-ci
          RESEND_API_KEY: re_test_fake_key_for_ci
        run: |
          python -m pytest test_main.py -v --tb=short

  # ─── JOB 2: FRONTEND SYNC CHECK ───────────────────────────────────────────
  # Verifies that ./index.html and ./frontend/index.html are identical.
  # Catches the common mistake of updating one file but forgetting the other.
  frontend-sync:
    name: Frontend Sync Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check index.html files are in sync
        run: |
          if diff -q index.html frontend/index.html > /dev/null 2>&1; then
            echo "✅ index.html and frontend/index.html are in sync"
          else
            echo "❌ index.html and frontend/index.html are out of sync!"
            echo "Run: cp index.html frontend/index.html"
            diff index.html frontend/index.html
            exit 1
          fi

  # ─── JOB 3: FRONTEND BROWSER TESTS (PLAYWRIGHT) ───────────────────────────
  # NEW (F58): Runs Playwright tests against index.html in a real browser.
  # Tests cover: login flow, hero headline states, onboarding card,
  # completeness scoring, navigation, and copy verification.
  #
  # HOW IT WORKS:
  # 1. Installs Node.js + npm dependencies (Playwright + serve)
  # 2. Installs Chromium browser
  # 3. "serve" spins up a local web server on port 3000 serving index.html
  # 4. Playwright opens Chromium, navigates to localhost:3000, runs tests
  # 5. API calls are mocked (intercepted) so no Railway backend needed
  frontend-tests:
    name: Frontend Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: |
          npm install --save-dev @playwright/test
          npm install --save-dev serve

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --reporter=list

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
